name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: OpenAPI codegen (committed artifacts must match)
        run: pnpm codegen:api:check

      - name: Lint
        run: pnpm lint

      - name: Format
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  package-smoke:
    name: Packaging smoke (T6 / Linux)
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build distributable (Linux zip)
        run: pnpm dist:linux

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: star-hotel-linux-${{ github.run_id }}
          path: release/*.zip
          if-no-files-found: error

  package-smoke-win:
    name: Packaging smoke (T6 / Windows x64)
    needs: check
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build distributable (Windows NSIS)
        run: pnpm dist:win

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: star-hotel-win-${{ github.run_id }}
          path: release/*.exe
          if-no-files-found: error
